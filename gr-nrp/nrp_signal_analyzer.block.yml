id: nrp_signal_analyzer
label: Signal Analyzer
category: '[NRP]'

parameters:
- id: alpha
  label: Smooth Rate
  dtype: float
  default: 0.001

inputs:
- label: Audio In
  dtype: float

outputs:
- label: SNR (dB)
  dtype: float
- label: Coherency (0-1)
  dtype: float

templates:
  imports: import nrp
  make: nrp.signal_analyzer(${alpha})
